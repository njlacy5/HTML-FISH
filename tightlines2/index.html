<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tight Lines">
<meta name="theme-color" content="#3a5a3c">
<title>Tight Lines</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0e1a12;--paper:#f2ede4;--moss:#3a5a3c;--water:#2c6e7f;
  --amber:#c8832a;--rust:#9e3a1a;--mist:#a8bfb0;--cream:#e8e0d0;--gold:#d4a942;
  --sat: env(safe-area-inset-top,0px);--sab: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--paper);overscroll-behavior:none}
body{font-family:'IBM Plex Sans',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{min-height:100vh;display:flex;flex-direction:column;
  background:var(--paper) url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%233a5a3c' fill-opacity='0.035'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
header{background:var(--moss);padding:calc(var(--sat) + 14px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--amber);
  position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:1.45rem;font-weight:900;color:var(--paper)}
.logo span{color:var(--gold)}
.hdr-tag{font-family:'IBM Plex Mono',monospace;font-size:0.58rem;color:var(--mist);letter-spacing:2px;text-transform:uppercase;text-align:right;line-height:1.6}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 15px calc(var(--sab) + 18px);max-width:680px;margin:0 auto;width:100%}
.card{background:white;border:1px solid #d0c8b8;border-radius:3px;padding:18px;margin-bottom:14px;box-shadow:3px 3px 0 #d0c8b8}
.card-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--moss);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--cream)}
.lbl{display:block;font-family:'IBM Plex Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--water);margin-bottom:4px;margin-top:11px}
.inp{width:100%;padding:10px 12px;border:1px solid #c0b8a8;background:var(--paper);font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;color:var(--ink);border-radius:2px;outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--water)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.btn-main{width:100%;padding:13px;background:var(--moss);color:var(--paper);border:none;font-family:'IBM Plex Mono',monospace;font-size:0.76rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;box-shadow:3px 3px 0 var(--amber);margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:active{background:var(--water);transform:translate(2px,2px);box-shadow:1px 1px 0 var(--amber)}
.btn-main:disabled{opacity:0.5}
.btn-sec{width:100%;padding:11px;background:transparent;border:1px solid var(--water);color:var(--water);font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-sec:active{background:var(--water);color:white}
.err-box{background:#fff0ee;border:1px solid #e0a090;padding:12px 14px;border-radius:2px;font-size:0.82rem;color:var(--rust);margin-bottom:14px}
.warn-box{background:#fff8ec;border:1px solid #e8d090;padding:8px 12px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:#7a5a00;margin-bottom:12px;line-height:1.5}
.spinner{width:30px;height:30px;border:3px solid var(--cream);border-top-color:var(--moss);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
.spinner-sm{width:16px;height:16px;border:2px solid var(--cream);border-top-color:var(--moss);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:32px;display:none}
.loading p{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--moss);letter-spacing:1px;margin-top:4px}
.tab-nav{display:flex;border-bottom:2px solid var(--cream);margin-bottom:14px;background:white;border-radius:3px 3px 0 0;overflow:hidden}
.tab-btn{flex:1;background:none;border:none;padding:12px 6px;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.on{color:var(--moss);border-bottom-color:var(--moss);font-weight:500}
.tab{display:none}.tab.on{display:block}
.cond-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.cond{background:var(--paper);border:1px solid var(--cream);padding:8px 5px;border-radius:2px;text-align:center}
.cond-v{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--moss);line-height:1.2}
.cond-k{font-family:'IBM Plex Mono',monospace;font-size:.5rem;letter-spacing:1px;text-transform:uppercase;color:#777;margin-top:2px}
.score-row{display:flex;gap:10px;margin-bottom:16px}
.sbadge{flex:1;padding:14px 10px;border-radius:2px;text-align:center;color:white}
.snum{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;line-height:1;color:var(--gold)}
.slbl{font-family:'IBM Plex Mono',monospace;font-size:0.56rem;letter-spacing:2px;text-transform:uppercase;opacity:.85;margin-top:3px}
.ssub{font-size:.68rem;opacity:.7;margin-top:2px}
.fsec{border-left:4px solid var(--moss);padding-left:12px;margin-bottom:16px}
.fsec.cat{border-color:var(--water)}
.fname{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.fname em{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-style:normal;color:var(--amber);margin-left:8px}
.rec{background:var(--paper);border:1px solid var(--cream);padding:9px 11px;margin-bottom:7px;border-radius:2px}
.rec h4{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--water);margin-bottom:4px}
.rec p{font-size:.82rem;line-height:1.5;color:#333}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{background:var(--moss);color:white;padding:3px 9px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:.62rem}
.tag.sec{background:var(--water)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.chip{background:var(--gold);color:var(--ink);padding:3px 10px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:500}
.divider{border:none;border-top:1px dashed #c0b8a8;margin:14px 0}
.analysis{font-size:.82rem;line-height:1.65;color:#333}
/* forecast */
.fc-list{display:flex;flex-direction:column;gap:9px}
.fday{background:var(--paper);border:1px solid #d0c8b8;border-radius:2px;padding:12px;cursor:pointer;-webkit-user-select:none;user-select:none}
.fday.open{border-color:var(--moss);box-shadow:2px 2px 0 var(--moss)}
.fday-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.fday-dow{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:1.5px;text-transform:uppercase;color:#888}
.fday-date{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700}
.fbadges{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.fbest{display:inline-block;padding:2px 6px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:.52rem;font-weight:600;background:var(--gold);color:var(--ink)}
.fbest.cat{background:var(--water);color:white}
.fscores{display:flex;gap:5px}
.fscore{padding:4px 7px;border-radius:2px;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:white;text-align:center;min-width:36px}
.fscore-lbl{font-family:'IBM Plex Mono',monospace;font-size:.44rem;display:block;letter-spacing:1px;text-transform:uppercase;opacity:.8}
.bar{height:4px;background:var(--cream);border-radius:3px;overflow:hidden;margin:3px 0 7px}
.bar-f{height:100%;border-radius:3px}
.fchips{display:flex;gap:4px;flex-wrap:wrap}
.fchip{font-family:'IBM Plex Mono',monospace;font-size:.54rem;padding:2px 5px;border-radius:2px;background:var(--cream);color:#444;border:1px solid #d0c8b8}
.fhint{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:#bbb;text-align:right;margin-top:6px}
.fdetail{border-top:1px dashed #c0b8a8;padding-top:10px;margin-top:8px;display:none}
.fday.open .fdetail{display:block}
.det-lbl{font-family:'IBM Plex Mono',monospace;font-size:.56rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--water);margin-bottom:3px;margin-top:8px}
.det-txt{font-size:.8rem;line-height:1.45;color:#333}
.loc-st{font-family:'IBM Plex Mono',monospace;font-size:.64rem;color:#666;margin-top:8px}
footer{text-align:center;padding:16px;font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:#aaa;letter-spacing:1px}
#results{display:none}
</style>
</head>
<body>
<div class="app">
<header>
  <div>
    <div class="logo">Tight <span>Lines</span></div>
    <div class="hdr-tag">AI FISHING INTELLIGENCE</div>
  </div>
  <div class="hdr-tag">BASS &amp;<br>CHANNEL CATFISH</div>
</header>

<div class="body">
  <div class="card">
    <div class="card-title">⚙️ Location &amp; Conditions</div>
    <div class="row2">
      <div><span class="lbl">Latitude</span><input class="inp" id="lat" type="text" placeholder="38.9072" inputmode="decimal"></div>
      <div><span class="lbl">Longitude</span><input class="inp" id="lon" type="text" placeholder="-77.0369" inputmode="decimal"></div>
    </div>
    <span class="lbl">Water Body</span>
    <select class="inp" id="waterType">
      <option value="small pond (2-3 acres)">Small Pond (2–3 acres)</option>
      <option value="large pond (5-10 acres)">Large Pond (5–10 acres)</option>
      <option value="small lake">Small Lake</option>
      <option value="large lake or reservoir">Large Lake / Reservoir</option>
      <option value="river or creek">River / Creek</option>
    </select>
    <div class="row2">
      <div>
        <span class="lbl">Water Clarity</span>
        <select class="inp" id="clarity">
          <option value="clear">Clear</option>
          <option value="slightly stained">Slightly Stained</option>
          <option value="stained / tannic">Stained / Tannic</option>
          <option value="muddy">Muddy</option>
        </select>
      </div>
      <div><span class="lbl">Water Temp °F</span><input class="inp" id="waterTemp" type="number" placeholder="Blank=estimate" inputmode="numeric"></div>
    </div>
    <span class="lbl">Cover / Structure</span>
    <select class="inp" id="cover">
      <option value="mixed (docks, laydowns, vegetation)">Mixed (docks, laydowns, weeds)</option>
      <option value="heavy vegetation and lily pads">Heavy Vegetation / Lily Pads</option>
      <option value="rocky or hard bottom">Rocky / Hard Bottom</option>
      <option value="laydowns and brush piles">Laydowns &amp; Brush Piles</option>
      <option value="open water with minimal cover">Open Water / Minimal Cover</option>
    </select>
    <button class="btn-main" id="analyzeBtn" onclick="run()">🎣 ANALYZE CONDITIONS</button>
    <button class="btn-sec" onclick="locate()">📍 USE MY LOCATION</button>
    <div class="loc-st" id="locSt"></div>
  </div>

  <div class="err-box" id="errBox" style="display:none"></div>
  <div class="loading" id="loadBox"><div class="spinner"></div><p id="loadMsg"></p></div>

  <div id="results">
    <div class="tab-nav">
      <button class="tab-btn on" onclick="tab('today',this)">📋 Today</button>
      <button class="tab-btn" onclick="tab('forecast',this)">📅 10-Day</button>
    </div>
    <div class="tab on" id="tab-today"></div>
    <div class="tab" id="tab-forecast"></div>
  </div>

  <footer>TIGHT LINES v2.0 · Weather: Open-Meteo · AI: Claude · Check local regs 🎣</footer>
</div>
</div>

<script>
const M = 'claude-sonnet-4-20250514';
let WX=null, INP={}, fcBuilt=false;

// helpers
const wdirs = d => ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
const wdesc = c => c===0?'Clear':c<=2?'Partly cloudy':c===3?'Overcast':c<=49?'Foggy':c<=67?'Rain':c<=77?'Snow':c<=82?'Showers':c<=99?'Storms':'Mixed';
const season = m => m<=1||m===11?'winter':m<=4?'spring':m<=7?'summer':'fall';
const estWT = (a,m) => Math.round(([42,44,50,58,66,74,78,79,75,65,54,44][m]||65)*0.7+a*0.3);

function moon(date) {
  const p=(((date-new Date('2000-01-06'))/86400000)%29.53059+29.53059)%29.53059;
  if(p<1.85)return{n:'New Moon',e:'🌑',s:'excellent'};
  if(p<7.38)return{n:'Waxing Crescent',e:'🌒',s:'good'};
  if(p<9.22)return{n:'First Quarter',e:'🌓',s:'fair'};
  if(p<14.77)return{n:'Waxing Gibbous',e:'🌔',s:'good'};
  if(p<16.61)return{n:'Full Moon',e:'🌕',s:'excellent'};
  if(p<22.15)return{n:'Waning Gibbous',e:'🌖',s:'good'};
  if(p<23.99)return{n:'Last Quarter',e:'🌗',s:'fair'};
  return{n:'Waning Crescent',e:'🌘',s:'good'};
}

function ptrd(daily) {
  if(!daily||daily.surface_pressure_max.length<2)return'steady';
  const d=daily.surface_pressure_max[0]-daily.surface_pressure_max[1];
  return d>1.5?'rising':d<-1.5?'falling':'steady';
}

function sBass({wt,pt,wind,precip,mn,mo}){
  let s=5;
  if(wt>=62&&wt<=78)s+=2;else if(wt>=52)s+=1;else if(wt<44||wt>86)s-=2;
  if(pt==='rising')s+=1;else if(pt==='falling')s-=1;
  if(mn.s==='excellent')s+=1;else if(mn.s==='fair')s-=0.5;
  if(precip>0.6)s-=1;if(wind<10)s+=0.5;else if(wind>22)s-=1;
  if(mo>=3&&mo<=5)s+=1;
  return Math.max(1,Math.min(10,Math.round(s)));
}
function sCat({wt,pt,precip,mn,mo}){
  let s=5;
  if(wt>=65&&wt<=84)s+=2;else if(wt>=55)s+=1;else if(wt<45)s-=2;
  if(mn.s==='excellent')s+=1.5;else if(mn.s==='fair')s-=0.5;
  if(precip>0.05&&precip<1)s+=0.5;
  if(mo>=5&&mo<=8)s+=0.5;if(pt!=='steady')s+=0.5;
  return Math.max(1,Math.min(10,Math.round(s)));
}

// UI helpers
function tab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  if(name==='forecast'&&!fcBuilt&&WX)buildFc();
}
function setLoad(on,msg){
  document.getElementById('loadBox').style.display=on?'block':'none';
  if(msg)document.getElementById('loadMsg').textContent=msg;
  document.getElementById('analyzeBtn').disabled=on;
}
function showErr(m){const e=document.getElementById('errBox');e.textContent='⚠ '+m;e.style.display='block';}
function hideErr(){document.getElementById('errBox').style.display='none';}

function locate(){
  const s=document.getElementById('locSt');
  s.textContent='Locating...';
  navigator.geolocation.getCurrentPosition(p=>{
    document.getElementById('lat').value=p.coords.latitude.toFixed(4);
    document.getElementById('lon').value=p.coords.longitude.toFixed(4);
    s.textContent='✓ Location set';
    setTimeout(()=>s.textContent='',3000);
  },()=>{s.textContent='Location unavailable — enter manually.';});
}

async function fetchWx(lat,lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,wind_direction_10m,surface_pressure,weather_code,cloud_cover,precipitation`+
    `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,wind_direction_10m_dominant,surface_pressure_max,surface_pressure_min,weather_code`+
    `&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=10`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('Weather fetch failed ('+r.status+')');
  return r.json();
}

async function claude(prompt,maxT=900){
  const r=await fetch('/api/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:M,max_tokens:maxT,messages:[{role:'user',content:prompt}]})
  });
  const data=await r.json();
  if(!r.ok)throw new Error(data.error?.message||'API error '+r.status);
  return data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
}

function pj(raw){
  // Strip markdown fences if present
  var s=raw.trim();
  if(s.startsWith("```")){s=s.replace(/^```[a-z]*
?/,"").replace(/
?```$/,"").trim();}
  // Try direct parse first
  try{return JSON.parse(s);}catch(e1){}
  // Extract first {...} block
  var start=s.indexOf("{");
  var end=s.lastIndexOf("}");
  if(start!==-1&&end!==-1&&end>start){
    try{return JSON.parse(s.slice(start,end+1));}catch(e2){}
  }
  throw new Error("AI returned unexpected format. Raw: "+s.slice(0,120));
}

async function run(){
  const lat=parseFloat(document.getElementById('lat').value);
  const lon=parseFloat(document.getElementById('lon').value);
  if(isNaN(lat)||isNaN(lon)){showErr('Enter valid coordinates or tap Use My Location.');return;}
  INP={
    waterType:document.getElementById('waterType').value,
    clarity:document.getElementById('clarity').value,
    waterTemp:document.getElementById('waterTemp').value,
    cover:document.getElementById('cover').value,
  };
  hideErr();setLoad(true,'Fetching live weather...');
  document.getElementById('results').style.display='none';
  fcBuilt=false;
  try{
    const wx=await fetchWx(lat,lon);
    WX=wx;
    const c=wx.current,daily=wx.daily,now=new Date(),mo=now.getMonth();
    const mn=moon(now),pt=ptrd(daily);
    const airT=Math.round(c.temperature_2m);
    const waterT=INP.waterTemp?parseInt(INP.waterTemp):estWT(airT,mo);
    const windS=Math.round(c.wind_speed_10m),windD=wdirs(c.wind_direction_10m);
    const pInHg=(c.surface_pressure*0.02953).toFixed(2);
    const hum=Math.round(c.relative_humidity_2m),cloud=Math.round(c.cloud_cover);
    const precip=c.precipitation||0,seas=season(mo),wxD=wdesc(c.weather_code);

    // render conditions
    document.getElementById('tab-today').innerHTML=`
      <div class="card">
        <div class="card-title">🌤️ Live Conditions</div>
        <div class="warn-box">📡 Live · Open-Meteo · ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${wxD}</div>
        <div class="cond-grid">
          ${[['Air',airT+'°F'],['Water',waterT+'°F'+(INP.waterTemp?'':'*')],['Wind',windS+' '+windD],['Pressure',pInHg+'"'],['Humidity',hum+'%'],['Clouds',cloud+'%'],['Precip',precip.toFixed(2)+'"'],['Moon',mn.e+' '+mn.n.split(' ').pop()]].map(([k,v])=>`<div class="cond"><div class="cond-v">${v}</div><div class="cond-k">${k}</div></div>`).join('')}
        </div>
      </div>
      <div class="card" id="rptCard"><div class="card-title">🐟 Today's Fishing Report</div><div style="text-align:center;padding:20px"><div class="spinner"></div></div></div>`;

    document.getElementById('results').style.display='block';
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));
    setLoad(false);

    // fetch AI
    const prompt=`You are an expert bass and channel catfish fishing guide for small ponds in Northern Virginia.

CONDITIONS: ${now.toDateString()} (${seas})
Air: ${airT}°F | Water: ${waterT}°F | Wind: ${windS} mph ${windD}
Pressure: ${pInHg}" ${pt} | Cloud: ${cloud}% | Humidity: ${hum}%
Precip: ${precip.toFixed(2)}" | Sky: ${wxD} | Moon: ${mn.n} ${mn.e} (solunar: ${mn.s})
Water: ${INP.waterType} | Clarity: ${INP.clarity} | Cover: ${INP.cover}

Return JSON ONLY (no markdown):

function buildFc(){
  fcBuilt=true;
  const daily=WX.daily;
  const days=daily.time.map((ds,i)=>{
    const date=new Date(ds+'T12:00:00'),mo=date.getMonth();
    const aH=Math.round(daily.temperature_2m_max[i]),aL=Math.round(daily.temperature_2m_min[i]);
    const wt=(i===0&&INP.waterTemp)?parseInt(INP.waterTemp):estWT((aH+aL)/2,mo);
    const wind=Math.round(daily.wind_speed_10m_max[i]),windD=wdirs(daily.wind_direction_10m_dominant[i]);
    const precip=daily.precipitation_sum[i]||0;
    const prevP=i>0?daily.surface_pressure_max[i-1]:daily.surface_pressure_max[i];
    const pt=daily.surface_pressure_max[i]>prevP+1.5?'rising':daily.surface_pressure_max[i]<prevP-1.5?'falling':'steady';
    const pHigh=(daily.surface_pressure_max[i]*0.02953).toFixed(2);
    const mn=moon(date),seas=season(mo);
    const bS=sBass({wt,pt,wind,precip,mn,mo}),cS=sCat({wt,pt,precip,mn,mo});
    const dow=date.toLocaleDateString('en-US',{weekday:'short'});
    const dl=date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const dow2=date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const wxD=wdesc(daily.weather_code[i]);
    return{i,mo,seas,aH,aL,wt,wind,windD,precip,pt,pHigh,mn,bS,cS,dow,dl,dow2,wxD,daysOut:i};
  });
  const bBest=days.reduce((b,d)=>d.bS>days[b].bS?d.i:b,0);
  const cBest=days.reduce((b,d)=>d.cS>days[b].cS?d.i:b,0);

  document.getElementById('tab-forecast').innerHTML=`
    <div class="card">
      <div class="card-title">📅 10-Day Fishing Outlook</div>
      <p style="font-size:.74rem;color:#666;margin-bottom:14px;font-family:'IBM Plex Mono',monospace;line-height:1.5">Scores 1–10 · <strong style="color:#3a5a3c">Tap any day</strong> for AI detail.</p>
      <div class="fc-list">
        ${days.map(d=>`
        <div class="fday" id="fd${d.i}" onclick="toggleDay(${d.i})">
          <div class="fday-top">
            <div>
              <div class="fday-dow">${d.dow}</div>
              <div class="fday-date">${d.dl}</div>
              <div class="fbadges">
                ${d.i===bBest?'<span class="fbest">🏆 Best Bass</span>':''}
                ${d.i===cBest?'<span class="fbest cat">🏆 Best Cats</span>':''}
              </div>
            </div>
            <div class="fscores">
              <div class="fscore" style="background:#3a5a3c">${d.bS}<span class="fscore-lbl">Bass</span></div>
              <div class="fscore" style="background:#2c6e7f">${d.cS}<span class="fscore-lbl">Cats</span></div>
            </div>
          </div>
          <div class="bar"><div class="bar-f" style="width:${d.bS*10}%;background:#3a5a3c"></div></div>
          <div class="bar"><div class="bar-f" style="width:${d.cS*10}%;background:#2c6e7f"></div></div>
          <div class="fchips">
            <span class="fchip">🌡 ${d.aH}°/${d.aL}°</span>
            <span class="fchip">💧~${d.wt}°F</span>
            <span class="fchip">💨${d.wind}mph ${d.windD}</span>
            <span class="fchip">${d.precip>0.1?'🌧'+d.precip.toFixed(1)+'"':'☀ Dry'}</span>
            <span class="fchip">${d.mn.e} ${d.mn.n}</span>
            <span class="fchip">P:${d.pt}</span>
          </div>
          <div class="fhint">tap for AI detail ▾</div>
          <div class="fdetail" id="fdd${d.i}"></div>
        </div>`).join('')}
      </div>
    </div>`;
}

      const prompt=`You are an expert bass/catfish fishing guide for a small pond in Northern Virginia.

      try{

        detail.innerHTML=`

          <div class="det-lbl">🐈 Catfish — Where &amp; How</div><div class="det-txt">${d.catWhere}<div class="tags" style="margin-top:5px">${tags(d.catBaits)}</div></div>
          <div class="det-lbl">Key Factor</div><div class="det-txt">${d.keyFactor}</div>`;
        detail.dataset.loaded='true';
      }catch(e){
